name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > release.keystore
          BUILD_TOOLS_VERSION=$(ls -d ${ANDROID_HOME}/build-tools/* | tail -1)
          
          # Find the generated APK
          UNSIGNED_APK=$(find build/outputs/apk/release -name "*.apk" | head -1)
          echo "Found APK: $UNSIGNED_APK"
          
          $BUILD_TOOLS_VERSION/apksigner sign --ks release.keystore \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --out build/outputs/apk/release/AOSPKeysNEXT-v0.1.2.apk \
            "$UNSIGNED_APK"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/outputs/apk/release/AOSPKeysNEXT-v0.1.2.apk
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
